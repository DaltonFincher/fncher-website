
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Fncher makes real estate agents and brokers have a simpler process to getting work done." />
  <meta name="keywords" content="real estate agents, real estate brokers, agent signup, broker signup, licensed professionals, home services network, fncher agents, fncher brokers" />
  <meta name="robots" content="index, follow" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
  <meta name="theme-color" content="#1e293b" />
  <title>Fncher – Join as Agent or Broker</title>
  
  <!-- Preload critical assets for maximum speed -->
  <link rel="preload" href="https://cdn.tailwindcss.com" as="script" />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style" />
  <link rel="icon" href="Fncherlogo.png" type="image/png" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --tw-color-primary: #3b82f6;
    }

    body {
      font-family: 'Inter', system_ui, -apple-system, sans-serif;
      background-color: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 2rem 1rem;
    }

    .fncher-logo {
      font-size: clamp(3rem, 9vw, 6rem);
      font-weight: 900;
      letter-spacing: -6px;
      line-height: 0.9;
      background: linear-gradient(90deg, #e2e8f0, #cbd5e1);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 15px 30px rgba(59, 130, 246, 0.25));
    }

    .cta-container {
      animation: fadeInUp 0.9s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .premium-btn {
      font-size: 1.75rem;
      font-weight: 700;
      padding: 1.25rem 3rem;
      border-radius: 1.5rem;
      width: 100%;
      max-width: 320px;
      transition: none !important;
    }

    @media (min-width: 640px) {
      .premium-btn {
        font-size: 1.9rem;
        padding: 1.25rem 3rem;
        max-width: none;
      }
    }

    .agent-btn {
      background-color: #3b82f6 !important;
      color: white !important;
      border: none !important;
    }

    .broker-btn {
      background-color: transparent !important;
      color: #e2e8f0 !important;
      border: 3px solid #3b82f6 !important;
    }

    /* Subtle background accent – toned down to match signup’s clean look */
    .bg-accent {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Extra mobile breathing room + requested tweaks (mobile layout ONLY) */
    @media (max-width: 480px) {
      .hero {
        padding: 1.5rem 1rem;
      }
      .fncher-logo {
        letter-spacing: -4px;
        font-size: 3.85rem;   /* slightly bigger on mobile only */
      }
      .premium-btn {
        font-size: 1.55rem;     /* slightly smaller on mobile only */
        padding: 1.05rem 2.6rem;
      }
    }

    /* COMPLETELY STATIC BUTTONS — zero changes or effects on any state */
    .premium-btn:hover,
    .premium-btn:active,
    .premium-btn:focus,
    .premium-btn:focus-visible,
    .premium-btn:focus-within {
      transform: none !important;
      box-shadow: none !important;
      outline: none !important;
      background-color: inherit !important;
      color: inherit !important;
      border-color: inherit !important;
      -webkit-tap-highlight-color: transparent !important;
    }
  </style>
</head>
<body>

  <!-- HERO – now matches signup color scheme and clean look (navbar removed) -->
  <section class="hero relative">
    
    <!-- Subtle accent (toned down to match signup) -->
    <div class="bg-accent"></div>

    <div class="relative z-10 text-center w-full max-w-md mx-auto">
      
      <!-- Simple centered Fncher (kept branding but now on matching background) -->
      <h1 class="fncher-logo mb-12">
        Fncher
      </h1>
      <!-- Tiny trust line – matches signup text color/style -->
      <p class="mt-14 text-slate-400 text-base font-medium tracking-wide">
        Made by agents. Made for agents.
      </p>
    </div>
  </section>

</body>
</html>
